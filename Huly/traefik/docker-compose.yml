services:
  nginx:
    image: "nginx:1.21.3"
    container_name: huly-nginx
#    ports:
#      - 80
    volumes:
      - ./files/volumes/nginx/.huly.nginx:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
    networks:
      - nat
    labels: # (optional only for using traefik) ---->
      - "traefik.enable=true"
      - "traefik.http.routers.huly-nginx.entrypoints=websecure"
      - "traefik.http.routers.huly-nginx.rule=Host(`huly.example.com`)" # Replace with your desired hostname
      - "traefik.http.routers.huly-nginx.tls=true"
      - "traefik.http.routers.huly-nginx.tls.certresolver=cloudflare" # Replace with your cert resolver name
      - "traefik.http.services.huly-nginx.loadbalancer.server.port=80"
      - "traefik.docker.network=nat" 
############################################################################################################################
  mongodb:
    image: "mongo:7-jammy"
    container_name: huly-mongodb
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./files/volumes/mongodb:/data/db
    restart: unless-stopped
    networks:
      - nat
############################################################################################################################
  minio:
    container_name: huly-minio
    image: "minio/minio:RELEASE.2024-11-07T00-52-20Z"
    command: server /data --address ":9000" --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    volumes:
      - ./files/volumes/minio:/data
    restart: unless-stopped
    networks:
      - nat
############################################################################################################################
  elastic:
    container_name: huly-elastic
    image: "elasticsearch:7.14.2"
    command: |
      /bin/sh -c "./bin/elasticsearch-plugin list | grep -q ingest-attachment || yes | ./bin/elasticsearch-plugin install --silent ingest-attachment;
      /usr/local/bin/docker-entrypoint.sh eswrapper"
    volumes:
      - elastic:/usr/share/elasticsearch/data
    environment:
      - ELASTICSEARCH_PORT_NUMBER=9200
      - BITNAMI_DEBUG=true
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1024m -Xmx1024m
      - http.cors.enabled=true
      - http.cors.allow-origin=http://localhost:8082
    healthcheck:
      interval: 20s
      retries: 10
      test: curl -s http://localhost:9200/_cluster/health | grep -vq '"status":"red"'
    restart: unless-stopped
    networks:
      - nat
############################################################################################################################
  rekoni:
    container_name: huly-rekoni
    image: hardcoreeng/rekoni-service:${HULY_VERSION}
    environment:
      - SECRET=${SECRET}
    deploy:
      resources:
        limits:
          memory: 500M
    restart: unless-stopped
    networks:
      - nat
############################################################################################################################
  transactor:
    container_name: huly-transactor
    image: hardcoreeng/transactor:${HULY_VERSION}
    environment:
      - SERVER_PORT=3333
      - SERVER_SECRET=${SECRET}
      - SERVER_CURSOR_MAXTIMEMS=30000
      - DB_URL=mongodb://mongodb:27017
      - MONGO_URL=mongodb://mongodb:27017
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
      - FRONT_URL=http://localhost:8087
      - ACCOUNTS_URL=http://account:3000
      - FULLTEXT_URL=http://fulltext:4700
      - STATS_URL=http://stats:4900
      - LAST_NAME_FIRST=${LAST_NAME_FIRST:-true}
      - MAIL_URL=http://mail:8097
      - AI_BOT_URL=http://aibot:4010
    restart: unless-stopped
    networks:
      - nat
############################################################################################################################
  collaborator:
    container_name: huly-collaborator
    image: hardcoreeng/collaborator:${HULY_VERSION}
    environment:
      - COLLABORATOR_PORT=3078
      - SECRET=${SECRET}
      - ACCOUNTS_URL=http://account:3000
      - DB_URL=mongodb://mongodb:27017
      - STATS_URL=http://stats:4900
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
    restart: unless-stopped
    networks:
      - nat
############################################################################################################################
  account:
    container_name: huly-account
    image: hardcoreeng/account:${HULY_VERSION}
    environment:
      - SERVER_PORT=3000
      - SERVER_SECRET=${SECRET}
      - DB_URL=mongodb://mongodb:27017
      - MONGO_URL=mongodb://mongodb:27017
      - TRANSACTOR_URL=ws://transactor:3333;ws${SECURE:+s}://${HOST_ADDRESS}/_transactor
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
      - FRONT_URL=http://front:8080
      - STATS_URL=http://stats:4900
      - MODEL_ENABLED=*
      - ACCOUNTS_URL=http://localhost:3000
      - ACCOUNT_PORT=3000
      - MAIL_URL=http://mail:8097
    restart: unless-stopped
    networks:
      - nat
############################################################################################################################
  workspace:
    container_name: huly-workspace
    image: hardcoreeng/workspace:${HULY_VERSION}
    environment:
      - SERVER_SECRET=${SECRET}
      - DB_URL=mongodb://mongodb:27017
      - MONGO_URL=mongodb://mongodb:27017
      - TRANSACTOR_URL=ws://transactor:3333;ws${SECURE:+s}://${HOST_ADDRESS}/_transactor
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
      - MODEL_ENABLED=*
      - ACCOUNTS_URL=http://account:3000
      - STATS_URL=http://stats:4900
    restart: unless-stopped
    networks:
      - nat
############################################################################################################################
  front:
    container_name: huly-front
    image: hardcoreeng/front:${HULY_VERSION}
    environment:
      - SERVER_PORT=8080
      - SERVER_SECRET=${SECRET}
      - LOVE_ENDPOINT=http${SECURE:+s}://${HOST_ADDRESS}/_love
      - ACCOUNTS_URL=http${SECURE:+s}://${HOST_ADDRESS}/_accounts
      - REKONI_URL=http${SECURE:+s}://${HOST_ADDRESS}/_rekoni
      - CALENDAR_URL=http${SECURE:+s}://${HOST_ADDRESS}/_calendar
      - GMAIL_URL=http${SECURE:+s}://${HOST_ADDRESS}/_gmail
      - TELEGRAM_URL=http${SECURE:+s}://${HOST_ADDRESS}/_telegram
      - STATS_URL=http${SECURE:+s}://${HOST_ADDRESS}/_stats
      - UPLOAD_URL=/files
      - ELASTIC_URL=http://elastic:9200
      - COLLABORATOR_URL=ws${SECURE:+s}://${HOST_ADDRESS}/_collaborator
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
      - DB_URL=mongodb://mongodb:27017
      - MONGO_URL=mongodb://mongodb:27017
      - TITLE=${TITLE:-Huly Self Host}
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-en}
      - LAST_NAME_FIRST=${LAST_NAME_FIRST:-true}
      - DESKTOP_UPDATES_CHANNEL=selfhost
      - AI_URL=http://aibot:4010
    restart: unless-stopped
    networks:
      - nat
############################################################################################################################
  fulltext:
    container_name: huly-fulltext
    image: hardcoreeng/fulltext:${HULY_VERSION}
    environment:
      - SERVER_SECRET=${SECRET}
      - DB_URL=mongodb://mongodb:27017
      - FULLTEXT_DB_URL=http://elastic:9200
      - ELASTIC_INDEX_NAME=huly_storage_index
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
      - REKONI_URL=http://rekoni:4004
      - ACCOUNTS_URL=http://account:3000
      - STATS_URL=http://stats:4900
    restart: unless-stopped
    networks:
      - nat
############################################################################################################################
  stats:
    container_name: huly-stats
    image: hardcoreeng/stats:${HULY_VERSION}
    environment:
      - PORT=4900
      - SERVER_SECRET=${SECRET}
    restart: unless-stopped 
    networks:
      - nat
####################################################################################
  mail:
    image: hardcoreeng/mail:v0.6.482
    container_name: huly-mail
#    ports:
#      - 8097:8097
    environment:
      - PORT=8097
      - SOURCE=${EMAIL_FROM}
      - SMTP_HOST=${SMTP_SERVER_URL}
      - SMTP_PORT=${SMTP_SERVER_PORT}
      - SMTP_USERNAME=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}      
    restart: unless-stopped
    networks:
      - nat
############################################################################################################################
  aibot:
    container_name: huly-aibot
    image: hardcoreeng/ai-bot:v0.6.482
#    ports:
#      - 4010:4010
    environment:
      - PORT=4010
      - SERVER_SECRET=${SECRET}
      - OPENAI_PASSWORD=${OPENAI_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
    restart: unless-stopped
    networks:
      - nat
############################################################################################################################
networks:
  nat:
    external: true
############################################################################################################################
volumes:
  elastic:
    driver: local
############################################################################################################################
