services:
  kasm:
    image: lscr.io/linuxserver/kasm:latest
    container_name: kasm
    privileged: true
    security_opt:
      - apparmor:rootlesskit #optional
    environment:
      - KASM_PORT=443
      - DOCKER_HUB_USERNAME=$DOCKER_HUB_USERNAME #optional
      - DOCKER_HUB_PASSWORD=$DOCKER_HUB_PASSWORD #optional
      - DOCKER_MTU=1500 #optional
    volumes:
      - /path/to/kasm/data:/opt
      - /path/to/kasm/profiles:/profiles #optional
      - /dev/input:/dev/input #optional
      - /run/udev/data:/run/udev/data #optional
#    ports:
#      - 3000:3000
#      - 443:443
    restart: unless-stopped
    labels: # (optional only for using traefik) ------>
      - "traefik.enable=true"
      - "traefik.http.routers.kasm.service=kasm"
      - "traefik.http.routers.kasm.entrypoints=websecure"
      - "traefik.http.routers.kasm.rule=Host(`kasm.neurolearninglabs.com`)" # Replace with your desired hostname
      - "traefik.http.routers.kasm.tls=true"
      - "traefik.http.routers.kasm.tls.certresolver=cloudflare" # Replace with your cert resolver name
      - "traefik.http.services.kasm.loadbalancer.server.port=443"    
      - "traefik.docker.network=dokploy-network" 
      - "traefik.http.services.kasm.loadbalancer.server.scheme=https"
###############################################################  (for installation)--      
      - "traefik.http.routers.kasm-admin.service=kasm-admin" 
      - "traefik.http.routers.kasm-admin.entrypoints=websecure"
      - "traefik.http.routers.kasm-admin.rule=Host(`kasm-admin.neurolearninglabs.com`)" # Replace with your desired hostname
      - "traefik.http.routers.kasm-admin.tls=true"
      - "traefik.http.routers.kasm-admin.tls.certresolver=cloudflare" # Replace with your cert resolver name
      - "traefik.http.services.kasm-admin.loadbalancer.server.port=3000"    
      - "traefik.http.routers.kasm-admin.service=kasm-admin"       
      - "traefik.http.services.kasm-admin.loadbalancer.server.scheme=https"   
    networks:
      - nat

networks:
  nat:
    external: true     
