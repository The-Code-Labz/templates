services:
  mailpit:
    image: axllent/mailpit:v1.22.3
    container_name: mailpit
    restart: unless-stopped
    ports:
      - '1025:1025'  # SMTP
      - '8025:8025'  # Web UI
    volumes:
      - mailpit-data:/data
    environment:
      - MP_SMTP_AUTH_ALLOW_INSECURE=true
      - MP_MAX_MESSAGES=5000
      - MP_DATABASE=/data/mailpit.db
      - MP_UI_AUTH=${MP_UI_AUTH}
      - MP_SMTP_AUTH=${MP_SMTP_AUTH}
      - MP_SMTP_FORWARD_TO=${MP_SMTP_FORWARD_TO}
      - MP_SMTP_FORWARD_HOST=${MP_SMTP_FORWARD_HOST}
      - MP_SMTP_FORWARD_PORT=${MP_SMTP_FORWARD_PORT}
      - MP_SMTP_FORWARD_TLS=${MP_SMTP_FORWARD_TLS}
      - MP_SMTP_FORWARD_USERNAME=${MP_SMTP_FORWARD_USERNAME}
      - MP_SMTP_FORWARD_PASSWORD=${MP_SMTP_FORWARD_PASSWORD}
      - MP_SMTP_FORWARD_AUTH=${MP_SMTP_FORWARD_AUTH}
      - MP_SMTP_FORWARD_RETURN_PATH=${MP_SMTP_FORWARD_RETURN_PATH}
      - MP_SMTP_FORWARD_OVERRIDE_FROM=${MP_SMTP_FORWARD_OVERRIDE_FROM}
    healthcheck:
      test:
        - CMD
        - /mailpit
        - readyz
      interval: 5s
      timeout: 20s
      retries: 10
    labels: # (optional only for using traefik) ---->
      - "traefik.enable=true"
      - "traefik.http.routers.mailpit.entrypoints=websecure"
      - "traefik.http.routers.mailpit.rule=Host(`mailpit.example.com`)"
      - "traefik.http.routers.mailpit.tls=true"
      - "traefik.http.routers.mailpit.tls.certresolver=cloudflare"
      - "traefik.http.services.mailpit.loadbalancer.server.port=8025"
      - "traefik.docker.network=nat"
      - "traefik.http.routers.mailpit.service=mailpit"
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.http.routers.mailpit.middlewares=authentik@file" # (optional if using authentik or basic auth to protect your site)
    networks:
      - nat
###########################################################################################################

volumes:
  mailpit-data:
    driver: local
    driver_opts:   # (optional for local storage)
      type: none
      device: /path/to/your/local/folder/mailpit-data
      o: bind
networks:
  nat:
    external: true