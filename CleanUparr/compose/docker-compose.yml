services:
  cleanuparr:
    image: ghcr.io/cleanuparr/cleanuparr:latest
    container_name: cleanuparr
    restart: unless-stopped
    ports:
      - "11011:11011"
    volumes:
      - /path/to/config:/config
    environment:
      - PORT=11011
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    networks:
      - nat
#    labels: # (optional only for using traefik) ----->
#      - "traefik.enable=true"
#      - "traefik.http.routers.cleanuparr.entrypoints=websecure"
#      - "traefik.http.routers.cleanuparr.rule=Host(`cleanuparr.yourdomain.com`)" # Replace with your desired hostname
#      - "traefik.http.routers.cleanuparr.tls=true"
#      - "traefik.http.routers.cleanuparr.tls.certresolver=cloudflare" # Replace with your cert resolver name
#      - "traefik.http.services.cleanuparr.loadbalancer.server.port=11011"    
#      - "traefik.docker.network=nat" 
#      - "traefik.http.routers.cleanuparr.service=cleanuparr"  
networks:
  nat: