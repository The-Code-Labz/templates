services:
  jellyseerr:    
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    restart: unless-stopped
    networks:
      - nat
#    ports:
#      - '5055:5055'
    environment:
      DB_TYPE: 'postgres' # Which DB engine to use. The default is "sqlite". To use postgres, this needs to be set to "postgres"
      DB_HOST: '${DB_HOST}' # The host (url) of the database
      DB_PORT: '${DB_PORT}' # The port to connect to
      DB_USER: '${DB_USER}' # Username used to connect to the database
      DB_PASS: '${DB_PASS}' # Password of the user used to connect to the database
      DB_NAME: '${DB_NAME}' # The name of the database to connect to
      DB_LOG_QUERIES: 'true' # Whether to log the DB queries for debugging
      DB_USE_SSL: 'false' # Whether to enable ssl for database connection
    volumes:
      - ./jellyseerr:/app/config
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyseerr.entrypoints=websecure"
      - "traefik.http.routers.jellyseerr.rule=Host(`jellyseerr.example.com`)" # Replace with your desired hostname
      - "traefik.http.routers.jellyseerr.tls=true"
      - "traefik.http.routers.jellyseerr.tls.certresolver=cloudflare" # Replace with your cert resolver name
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"    
      - "traefik.docker.network=nat" 
      - "traefik.http.routers.jellyseerr.service=jellyseerr"  
#############################################################################################################
  postgres:
    image: postgres
    environment:
      POSTGRES_USER: '${DB_USER}'
      POSTGRES_PASSWORD: '${DB_PASS}'
      POSTGRES_DB: '${DB_NAME}'
    ports:
      - '5432:5432'
    volumes:
      - ./postgres:/var/lib/postgresql/data
    networks:
      - nat
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    
networks:
  nat:
    external: true
