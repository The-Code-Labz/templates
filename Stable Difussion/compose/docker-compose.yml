services:  
  stable-diffusion-webui:
    image: zefie/stable-diffusion-automatic1111:latest
    container_name: automatic1111
    restart: unless-stopped
    environment:
      - CLI_ARGS=--allow-code --xformers --enable-insecure-extension-access --api --disable-safe-unpickle --no-half-vae
    ports:
      - 7860:7860
    volumes:
      - ./data:/data
      - ./output:/output
      - ./models:/models
    stop_signal: SIGKILL
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [compute, utility]
    networks:
      - nat
#    labels: # (optional only for using traefik) ------>
#      - "traefik.enable=true"
#      - "traefik.http.routers.automatic1111.entrypoints=websecure"
#      - "traefik.http.routers.automatic1111.rule=Host(`stable-diffusion.example.com`)" # Replace with your desired hostname
#      - "traefik.http.routers.automatic1111.tls=true"
#      - "traefik.http.routers.automatic1111.tls.certresolver=cloudflare" # Replace with your cert resolver name
#      - "traefik.http.services.automatic1111.loadbalancer.server.port=7860"    
#      - "traefik.docker.network=nat" 
#      - "traefik.http.routers.automatic1111.service=automatic1111"  
networks:
  nat:
    external: true

   