services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - /path/to/qbittorrent/appdata:/config
      - /path/to/downloads:/downloads #optional
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped
    networks:
      - nat
#    labels: # (optional only for using traefik) ----->
#      - "traefik.enable=true"
#      - "traefik.http.routers.qbittorrent.entrypoints=websecure"
#      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.yourdomain.com`)" # Replace with your desired hostname
#      - "traefik.http.routers.qbittorrent.tls=true"
#      - "traefik.http.routers.qbittorrent.tls.certresolver=cloudflare" # Replace with your cert resolver name
#      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"    
#      - "traefik.docker.network=nat" 
#      - "traefik.http.routers.qbittorrent.service=qbittorrent"  
networks:
  nat:
    external: true      