services:
  unsend-db-prod:
    image: postgres:16
    container_name: unsend-db-prod
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # ports:
    #   - "5432:5432"
    volumes:
      - ./postgres:/var/lib/postgresql/data
    networks:
      - nat
#############################################################################      
  unsend-redis-prod:
    image: redis:7
    container_name: unsend-redis-prod
    restart: always
    # ports:
    #   - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_USER=${REDIS_USER}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    volumes:
      - ./redis:/data
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    networks:
      - nat
#############################################################################      
  unsend-storage-prod:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: unsend-storage-prod
    restart: always
    ports:
      - 9002
      - 9001
    volumes:
      - ./storage:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    entrypoint: sh
    command: -c 'mkdir -p /data/unsend && minio server /data --console-address ":9001" --address ":9002"'
    networks:
      - nat
##########################################################################################
  unsend:
    image: unsend/unsend:v1.3.2
    container_name: unsend
    restart: always
#    ports:
#      - ${PORT:-3000}
    environment:
      - PORT=${PORT:-3000}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - GITHUB_ID=${GITHUB_ID}
      - GITHUB_SECRET=${GITHUB_SECRET}
      - REDIS_URL=redis://${REDIS_USER}:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}
      - NEXT_PUBLIC_IS_CLOUD=${NEXT_PUBLIC_IS_CLOUD:-false}
      - API_RATE_LIMIT=${API_RATE_LIMIT:-1}
    labels:   #(traefik)
      - "traefik.enable=true"
      - "traefik.http.routers.unsend.entrypoints=websecure"
      - "traefik.http.routers.unsend.rule=Host(`unsend.your-server.com`)" # Replace with your desired hostname
      - "traefik.http.routers.unsend.tls=true"
      - "traefik.http.routers.unsend.tls.certresolver=cloudflare" # Replace with your cert resolver name
      - "traefik.http.services.unsend.loadbalancer.server.port=3000"    
      - "traefik.docker.network=nat" 
      - "traefik.http.routers.unsend.service=unsend"   # Replace with your service name
    depends_on:
      unsend-db-prod:
        condition: service_healthy
      unsend-redis-prod:
        condition: service_started
    networks:
      - nat
######################################################################################
networks:
  nat:
    external: true