services:
  it-tools:
    container_name: it-tools
    image: corentinth/it-tools:latest
    restart: unless-stopped
    pull_policy: always
    ports:
      - 80:80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nat
#    labels:
#      - "traefik.enable=true"
#      - "traefik.http.routers.it-tools.entrypoints=websecure"
#      - "traefik.http.routers.it-tools.rule=Host(`it-tools.your-server.com`)" # Replace with your desired hostname
#      - "traefik.http.routers.it-tools.tls=true"
#      - "traefik.http.routers.it-tools.tls.certresolver=cloudflare" # Replace with your cert resolver name
#      - "traefik.http.services.it-tools.loadbalancer.server.port=80"    
#      - "traefik.docker.network=nat" 
#      - "traefik.http.routers.it-tools.service=it-tools"   # Replace with your service name
######################################################################################
networks:
  nat:
    external: true
