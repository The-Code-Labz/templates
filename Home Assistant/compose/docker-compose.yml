#      - "traefik.http.routers.homeassistant.rule=Host(`homeassistant.yourdomain.com`)" # Replace with your desired hostname
#      - "traefik.http.routers.homeassistant.tls=true"
#      - "traefik.http.routers.homeassistant.tls.certresolver=cloudflare" # Replace with your cert resolver name
#      - "traefik.http.services.homeassistant.loadbalancer.server.port=8123"    
#      - "traefik.docker.network=nat" 
#      - "traefik.http.routers.homeassistant.service=homeassistant"        
