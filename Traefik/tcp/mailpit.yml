tcp:
  routers:
    mailpit: # Replace with a unique name
      rule: "HostSNI(`*`)" # Replace with your domain
      service: mailpit # Replace with the name of your service
      entryPoints:
        - smtp
#      middlewares:
#        - traefik-real-ip
#      tls:
#        passthrough: true
#        certResolver: cloudflare # Use the Let's Encrypt resolver defined in traefik.yml file or replace with your own'
  services:
    mailpit: # Replace with the name of your service
      loadBalancer:
        servers:
          - address: "http://mailpit:1025" # The backend service to route traffic to