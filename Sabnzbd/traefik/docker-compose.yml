services:
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - /path/to/sabnzbd/config:/config
      - /path/to/incomplete/downloads:/incomplete-downloads #optional
      - /path/to/downloads:/downloads #optional
#    ports:
#      - 8080:8080
    restart: unless-stopped
    networks:
      - nat
    labels: # (optional only for using traefik) ----->
      - "traefik.enable=true"
      - "traefik.http.routers.sabnzbd.entrypoints=websecure"
      - "traefik.http.routers.sabnzbd.rule=Host(`sabnzbd.yourdomain.com`)" # Replace with your desired hostname
      - "traefik.http.routers.sabnzbd.tls=true"
      - "traefik.http.routers.sabnzbd.tls.certresolver=cloudflare" # Replace with your cert resolver name
      - "traefik.http.services.sabnzbd.loadbalancer.server.port=8080"    
      - "traefik.docker.network=nat" 
      - "traefik.http.routers.sabnzbd.service=sabnzbd"  
networks:
  nat:
    external: true      