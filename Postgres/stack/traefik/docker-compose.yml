services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    user: "1001:1001" # or root
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - nat
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
###################################################################
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    user: "1001:1001" # or root
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
#    ports:
#      - "5050:80"
    volumes:
      - ./pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - nat
    labels:  # optional for traefik
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.local.dev`)" # Replace with your desired hostname
      - "traefik.http.routers.pgadmin.tls=true"
      - "traefik.http.routers.pgadmin.tls.certresolver=cloudflare" # Replace with your cert resolver name
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"    
      - "traefik.docker.network=nat" 
      - "traefik.http.routers.pgadmin.service=pgadmin"
###################################################################
  pgbouncer:
    image: edoburu/pgbouncer
    container_name: pgbouncer
    user: "1001:1001" # or root
    restart: unless-stopped
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_NAME: ${DB_NAME}
    ports:
      - "6432:6432"
    depends_on:
      - postgres
    networks:
      - nat
    volumes:
      - ./pgbouncer:/etc/pgbouncer
    labels:  # optional for traefik
      - "traefik.enable=true"
      - "traefik.http.routers.pgbouncer.entrypoints=websecure"
      - "traefik.http.routers.pgbouncer.rule=Host(`pgbouncer.local.dev`)" # Replace with your desired hostname
      - "traefik.http.routers.pgbouncer.tls=true"
      - "traefik.http.routers.pgbouncer.tls.certresolver=cloudflare" # Replace with your cert resolver name
      - "traefik.http.services.pgbouncer.loadbalancer.server.port=6432"    
      - "traefik.docker.network=nat" 
      - "traefik.http.routers.pgbouncer.service=pgbouncer"
###################################################################
networks:
  nat:
    external: true
