services:
  docmost:
    image: docmost/docmost:0.4.1
    ports:
      - 3000:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_URL
      - APP_SECRET
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:5432/${POSTGRES_DB}?schema=public
      - REDIS_URL=redis://${REDIS_USER}:${REDIS_PASSWORD}@${REDIS_HOST}:6379
    restart: unless-stopped
#    labels: # (optional only for using traefik) ---->
#      - "traefik.enable=true"
#      - "traefik.http.routers.docmost.entrypoints=websecure"
#      - "traefik.http.routers.docmost.rule=Host(`docmost.example.com`)"
#      - "traefik.http.routers.docmost.tls=true"
#      - "traefik.http.routers.docmost.tls.certresolver=cloudflare"
#      - "traefik.http.services.docmost.loadbalancer.server.port=3000"
#      - "traefik.docker.network=nat"
#      - "traefik.http.routers.docmost.service=docmost"
#      - "com.centurylinklabs.watchtower.enable=true" # (optional only for using watchtower)
#      - "traefik.http.routers.docmost.middlewares=authentik@file" # (optional if using authentik or basic auth to protect your site)
    container_name: docmost
    volumes:
      - ./app:/app/data/storage
    networks:
      - nat
###########################################################################################################
  db:
    image: postgres:16-alpine
    container_name: docmost_postgres
    environment:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    restart: unless-stopped
    healthcheck:
      interval: 10s
      retries: 10
      test: 'pg_isready -U "$POSTGRES_USER" -d "$$POSTGRES_DB"'
      timeout: 2s
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    networks:
      - nat
###########################################################################################################
  redis:
    image: redis:7.2-alpine
    container_name: docmost_redis
    restart: unless-stopped
    environment:
      - REDIS_USER
      - REDIS_PASSWORD
    healthcheck:
      interval: 10s
      retries: 10
      test: 'redis-cli ping'
      timeout: 2s
    volumes:
      - ./redis/data:/data
    networks:
      - nat
###########################################################################################################
networks:
  nat:
    external: true
