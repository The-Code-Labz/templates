services:
  nocodb:
    image: nocodb/nocodb:0.257.2
    container_name: nocodb
    restart: unless-stopped
    environment:
      NC_DB: "pg://${DB_HOST}?u=${DB_USER}&p=${DB_PASSWORD}&d=${DB_NAME}"
      PORT: ${NOCODB_PORT}
      NC_REDIS_URL: ${NC_REDIS_URL}
    volumes:
      - ./nc_data:/usr/app/data
    depends_on:
      root_db:
        condition: service_healthy
    ports:
      - 8000:8000
#    labels: # (optional only for using traefik) ---->
#      - "traefik.enable=true"
#      - "traefik.http.routers.nocodb.entrypoints=websecure"
#      - "traefik.http.routers.nocodb.rule=Host(`nocodb.example.com`)"
#      - "traefik.http.routers.nocodb.tls=true"
#      - "traefik.http.routers.nocodb.tls.certresolver=cloudflare"
#      - "traefik.http.services.nocodb.loadbalancer.server.port=8000"
#      - "traefik.docker.network=nat"
#      - "traefik.http.routers.nocodb.service=nocodb"
#      - "com.centurylinklabs.watchtower.enable=true"
#      - "traefik.http.routers.nocodb.middlewares=authentik@file" # (optional if using authentik or basic auth to protect your site)
    networks:
      - nat
###########################################################################################################
  root_db:
    image: postgres:17
    restart: always
    container_name: nocodb_postgres
    environment:
      POSTGRES_DB: root_db
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      interval: 10s
      retries: 10
      test: 'pg_isready -U "$POSTGRES_USER" -d "$$POSTGRES_DB"'
      timeout: 2s
    volumes:
      - ./db_data:/var/lib/postgresql/data
    networks:
      - nat
###########################################################################################################
  redis:
    image: redis:7.2.0
    container_name: nocodb_redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_USER: ${REDIS_USER}
      REDIS_DB: ${REDIS_DB}
    volumes:
      - ./redis_data:/data
    networks:
      - nat
###########################################################################################################
networks:
  nat:
    external: true