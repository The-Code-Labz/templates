listen              1935;
max_connections     1000;

http_server {
    enabled         on;
    listen          8000;
    dir             /usr/local/srs/objs/nginx/html;
}

vhost __defaultVhost__ {
    hls {
        enabled     on;
        hls_path    /usr/local/srs/objs/nginx/html/live;
        hls_fragment    6;
        hls_window    60;
    }   
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].m3u8;
    }
}

vhost yourdomain.com {
    hls {
        enabled     on;
        hls_path    /usr/local/srs/objs/nginx/html/live;
        hls_fragment    2;
        hls_window    10;
    }   
}