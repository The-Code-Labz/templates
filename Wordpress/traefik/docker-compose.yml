services:
  wordpress:
    image: wordpress:6.7.1
    container_name: wordpress
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
    volumes:
      - ./wordpress_data:/var/www/html
#    ports:
#      - 80:80 #http
#      - 443:443 #https
    depends_on:
      db:
        condition: service_healthy
    labels:  # (optional only for using traefik) ---->
      - "traefik.enable=true"
      - "traefik.http.routers.wordpress.entrypoints=websecure"
      - "traefik.http.routers.wordpress.rule=Host(`wordpress.example.com`)" # Replace with your desired hostname
      - "traefik.http.routers.wordpress.tls=true"
      - "traefik.http.routers.wordpress.tls.certresolver=cloudflare" # Replace with your cert resolver name
      - "traefik.http.services.wordpress.loadbalancer.server.port=80"
      - "traefik.docker.network=nat"
      - "traefik.http.routers.wordpress.service=wordpress"
#      - "com.centurylinklabs.watchtower.enable=true"  # (optional if using watchtower for updates)
#      - "traefik.http.routers.wordpress.middlewares=authentik@file" # (optional if using authentik or basic auth to protect your site)
    networks:
      - nat
#########################################################################################################        
  db:
    image: mysql:5.7.34
    container_name: db_wordpress
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 20s
      retries: 10
    networks:
      - nat
#########################################################################################################
networks:
  nat:
    external: true