services:
  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - NZBGET_USER=nzbget #optional
      - NZBGET_PASS=tegbzn6789 #optional
    volumes:
      - /path/to/nzbget/data:/config
      - /path/to/downloads:/downloads #optional
    ports:
      - 6789:6789
    restart: unless-stopped
    networks:
      - nat
#    labels: # (optional only for using traefik) ----->
#      - "traefik.enable=true"
#      - "traefik.http.routers.nzbget.entrypoints=websecure"
#      - "traefik.http.routers.nzbget.rule=Host(`nzbget.yourdomain.com`)" # Replace with your desired hostname
#      - "traefik.http.routers.nzbget.tls=true"
#      - "traefik.http.routers.nzbget.tls.certresolver=cloudflare" # Replace with your cert resolver name
#      - "traefik.http.services.nzbget.loadbalancer.server.port=6789"    
#      - "traefik.docker.network=nat" 
#      - "traefik.http.routers.nzbget.service=nzbget"  
networks:
  nat:
    external: true      