services:
  # Database (Postgres)
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: reactive_resume_postgres
    networks:
      - nat
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
###########################################################################################
  # Storage (for image uploads)
  minio:
    image: minio/minio:latest
    container_name: reactive_resume_minio
    networks:
      - nat
    restart: unless-stopped
    command: server /data
#    ports:
#      - "9000:9000"
    volumes:
      - ./minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    labels: # (optional only for using traefik) ----->
      - traefik.enable=true
      - traefik.http.services.minio.loadbalancer.server.port=9000
      - traefik.http.routers.minio.service=minio
      - traefik.http.routers.minio.rule=Host(`minio.yourdomain.com`)
      - traefik.http.routers.minio.entrypoints=websecure
      - traefik.http.routers.minio.tls=true
      - traefik.http.routers.minio.tls.certresolver=cloudflare
      - traefik.docker.network=nat
#    <---------------------------------------------------------------------------
##############################################################################################
  # Chrome Browser (for printing and previews)
  chrome:
    image: ghcr.io/browserless/chromium:v2.18.0 # Upgrading to newer versions causes issues
    container_name: reactive_resume_chrome
    networks:
      - nat
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TIMEOUT: 10000
      CONCURRENT: 10
      TOKEN: ${TOKEN:-chrome_token}
      EXIT_ON_HEALTH_FAILURE: "true"
      PRE_REQUEST_HEALTH_CHECK: "true"
#########################################################################################################      
  app:
    image: amruthpillai/reactive-resume:latest
    container_name: reactive_resume_app
    networks:
      - nat
    restart: unless-stopped
#    ports:
#      - "3000:3000"
    depends_on:
      - postgres
      - minio
      - chrome
    environment:
      # -- Environment Variables --
      PORT: 3000
      NODE_ENV: production
      # -- URLs --
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      STORAGE_URL: ${STORAGE_URL:-http://minio:9000/default}
      # -- Printer (Chrome) --
      CHROME_TOKEN: ${TOKEN:-chrome_token}
      CHROME_URL: ${CHROME_URL:-ws://chrome:3000}
      # -- Database (Postgres) --
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      # -- Auth --
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-access_token_secret}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-refresh_token_secret}
      # -- Emails --
      MAIL_FROM: ${MAIL_FROM:-noreply@localhost}
      SMTP_URL: ${SMTP_URL:-smtp://user:pass@smtp:587} # Optional
      # -- Storage (Minio) --
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-minio}
      STORAGE_PORT: ${STORAGE_PORT:-9000}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1} # Optional
      STORAGE_BUCKET: ${STORAGE_BUCKET:-default}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_USE_SSL: ${STORAGE_USE_SSL:-false}
      STORAGE_SKIP_BUCKET_CHECK: ${STORAGE_SKIP_BUCKET_CHECK:-false}
      # -- Crowdin (Optional) --
      # CROWDIN_PROJECT_ID:
      # CROWDIN_PERSONAL_TOKEN:
      # -- Email (Optional) --
      # DISABLE_SIGNUPS: "false"
      # DISABLE_EMAIL_AUTH: "false"
      # -- GitHub (Optional) --
      # GITHUB_CLIENT_ID: github_client_id
      # GITHUB_CLIENT_SECRET: github_client_secret
      # GITHUB_CALLBACK_URL: http://localhost:3000/api/auth/github/callback
      # -- Google (Optional) --
      # GOOGLE_CLIENT_ID: google_client_id
      # GOOGLE_CLIENT_SECRET: google_client_secret
      # GOOGLE_CALLBACK_URL: http://localhost:3000/api/auth/google/callback
      # -- OpenID (Optional) --
      # VITE_OPENID_NAME: OpenID
      # OPENID_AUTHORIZATION_URL:
      # OPENID_CALLBACK_URL: http://localhost:3000/api/auth/openid/callback
      # OPENID_CLIENT_ID:
      # OPENID_CLIENT_SECRET:
      # OPENID_ISSUER:
      # OPENID_SCOPE: openid profile email
      # OPENID_TOKEN_URL:
      # OPENID_USER_INFO_URL:
    labels: # (optional only for using traefik) ----->
      - traefik.enable=true
      - traefik.http.services.app.loadbalancer.server.port=3000
      - traefik.http.routers.app.service=app
      - traefik.http.routers.app.rule=Host(`reactive-resume.yourdomain.com`)
      - traefik.http.routers.app.entrypoints=websecure
      - traefik.http.routers.app.tls=true
      - traefik.http.routers.app.tls.certresolver=cloudflare
      - traefik.docker.network=nat
#    <---------------------------------------------------------------------------
networks:
  nat:
    external: true
