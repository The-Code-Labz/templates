services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z-cpuv1 # have to use this image to get admin console to work
#    quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    restart: unless-stopped
#    ports:
#      - "9000:9000" # S3 API
#      - "9090:9090" # Console UI
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9090"
    volumes:
      - ./minio-data:/data
    networks:
      - nat
    labels: # traefik labels 
      - "traefik.enable=true"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.rule=Host(`minio.example.com`)" # Replace with your desired hostname
      - "traefik.http.routers.minio.tls=true"
      - "traefik.http.routers.minio.tls.certresolver=cloudflare" # Replace with your cert resolver name
      - "traefik.http.services.minio.loadbalancer.server.port=9000"    
      - "traefik.docker.network=nat" 
      - "traefik.http.routers.minio.service=minio"  
      - "traefik.http.routers.minio-api.entrypoints=websecure"
      - "traefik.http.routers.minio-api.rule=Host(`s3.example.com`)" # Replace with your desired hostname
      - "traefik.http.routers.minio-api.tls=true"
      - "traefik.http.routers.minio-api.tls.certresolver=cloudflare" # Replace with your cert resolver name
      - "traefik.http.services.minio-api.loadbalancer.server.port=9090"    
      - "traefik.http.routers.minio-api.service=minio-api"  
networks:
  nat:
    external: true          